services:
  ping5-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ping5-api
    ports:
      - "8000:8000"
    environment:
      REQUEST_VERIFY_TLS: "false"
      MONITOR_DB_PATH: "/app/data/monitor.db"
    volumes:
      - ping5_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/urls', timeout=5); sys.exit(0)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  ping5_data:
